name: "Stackage Nightly"

on:
  schedule:
    - cron: "5 6 * * *"
  workflow_dispatch:
  pull_request:
  push:
    paths:
      - ".github/workflows/stackage-nightly.yml"

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v7

      - uses: mbg/actions/stack/nightly@v0.3
